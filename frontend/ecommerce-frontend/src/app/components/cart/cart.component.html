<div class="dashboard-shell user-shell">
  <div class="dashboard-topbar user-topbar">
    <div>
      <h2>My Cart</h2>
      <p>Review your selected products and place your order</p>
    </div>
    <button class="btn btn-outline-light" (click)="goBack()">Back to Dashboard</button>
  </div>

  <div class="content-card" *ngIf="cart.length === 0">
    <div class="empty-state large">Your cart is empty.</div>
  </div>

  <div class="cart-list" *ngIf="cart.length > 0">
    <div *ngFor="let c of cart" class="cart-item card-like">
      <div class="cart-item-left cart-layout-two">
        <img [src]="c.product.image" class="cart-thumb" [alt]="c.product.name">
        <div>
          <h3>{{ c.product.name }}</h3>
          <p>{{ c.product.category }}</p>
          <p>Quantity: {{ c.quantity }}</p>
          <p>Price: ₹{{ c.product.price }}</p>
        </div>
      </div>

      <div class="cart-side-actions">
        <strong>₹{{ c.product.price * c.quantity }}</strong>
        <button class="btn btn-danger small-btn" (click)="remove(c.id)">Remove</button>
      </div>
    </div>

    <div class="cart-summary card-like">
      <h3>Total: ₹{{ totalAmount }}</h3>
      <button class="btn btn-success" (click)="placeOrder()" [disabled]="placingOrder">
        {{ placingOrder ? 'Placing Order...' : 'Place Order' }}
      </button>
    </div>
  </div>
</div>
