<header class="navbar navbar-expand-lg px-3 sticky-top custom-header">
  <div class="logo d-flex align-items-center" (click)="goHome()">
    <img src="assets/images/logo.png" alt="logo" class="logo-img me-2">
    Shop<span>EZ</span>
  </div>

  <nav class="mx-auto desktop-nav">
    <ul class="d-flex list-unstyled mb-0 gap-4 justify-content-center nav-links-list">
      <li><a (click)="scrollToSection('home')">Home</a></li>
      <li><a (click)="scrollToSection('about')">About</a></li>
      <li><a (click)="scrollToSection('collection')">Collection</a></li>
      <li><a (click)="scrollToSection('features')">Features</a></li>
      <li><a (click)="scrollToSection('contact')">Contact</a></li>
    </ul>
  </nav>

  <button class="navbar-toggler ms-auto border-0 d-lg-none"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#authMenu">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="d-none d-lg-flex ms-auto gap-2">
    <button class="btn btn-primary btn-lg" (click)="goLogin()">Login</button>
    <button class="btn btn-success btn-lg" (click)="goRegister()">Sign Up</button>
  </div>

  <div class="collapse auth-dropdown d-lg-none" id="authMenu">
    <div class="auth-card shadow">
      <a (click)="scrollToSection('home')">Home</a>
      <a (click)="scrollToSection('about')">About</a>
      <a (click)="scrollToSection('features')">Features</a>
      <a (click)="scrollToSection('contact')">Contact</a>
      <button class="btn btn-primary btn-lg" (click)="goLogin()">Login</button>
      <button class="btn btn-success btn-lg" (click)="goRegister()">Sign Up</button>
    </div>
  </div>
</header>
